name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

# Cancel in-flight runs for the same branch on new pushes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ============================================================
# Jobs
# ============================================================

jobs:
  # ----------------------------------------------------------
  # 1. Backend unit + integration tests (SQLite, no real DB)
  # ----------------------------------------------------------
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        run: pytest --tb=short -q
        env:
          SECRET_KEY: ci-secret-key-not-for-production
          JWT_SECRET_KEY: ci-jwt-secret-not-for-production
          JWT_ACCESS_TOKEN_EXPIRES: '3600'
          JWT_REFRESH_TOKEN_EXPIRES: '86400'
          # SQLite in-memory – no external DB required
          DATABASE_URL: sqlite:///:memory:
          CORS_ORIGINS: http://localhost:3000
          # Fake AWS creds so boto3 can be imported without error
          AWS_ACCESS_KEY_ID: fake-key-id
          AWS_SECRET_ACCESS_KEY: fake-secret-key
          AWS_REGION: us-east-1
          AWS_S3_BUCKET_NAME: ci-test-bucket

  # ----------------------------------------------------------
  # 2. Frontend unit tests (Jest)
  # ----------------------------------------------------------
  frontend-tests:
    name: Frontend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test -- --watchAll=false --ci --coverage
        env:
          CI: true

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage/
          retention-days: 7

  # ----------------------------------------------------------
  # 3. E2E tests (Playwright against the full stack)
  # ----------------------------------------------------------
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    # Only run E2E on pushes to main/master to save CI minutes
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')

    # PostgreSQL service container for the real database
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: causal
          POSTGRES_PASSWORD: causalpass
          POSTGRES_DB: causal_e2e
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements*.txt

      - name: Install backend dependencies
        run: pip install -r requirements.txt
        working-directory: backend

      - name: Start Flask backend
        run: python app.py &
        working-directory: backend
        env:
          SECRET_KEY: e2e-secret-key
          JWT_SECRET_KEY: e2e-jwt-secret
          JWT_ACCESS_TOKEN_EXPIRES: '3600'
          JWT_REFRESH_TOKEN_EXPIRES: '86400'
          DATABASE_URL: postgresql://causal:causalpass@localhost:5432/causal_e2e
          CORS_ORIGINS: http://localhost:3000
          AWS_ACCESS_KEY_ID: fake-key-id
          AWS_SECRET_ACCESS_KEY: fake-secret-key
          AWS_REGION: us-east-1
          AWS_S3_BUCKET_NAME: e2e-test-bucket
          PORT: '5001'
          FLASK_DEBUG: 'false'

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend
        env:
          REACT_APP_API_URL: http://localhost:5001/api

      - name: Serve built frontend
        run: npx --yes serve -s build -l 3000 &
        working-directory: frontend

      - name: Wait for services to be ready
        run: |
          echo "Waiting for backend..."
          timeout 30 bash -c 'until curl -sf http://localhost:5001/health; do sleep 2; done'
          echo "Waiting for frontend..."
          timeout 30 bash -c 'until curl -sf http://localhost:3000; do sleep 2; done'

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium
        working-directory: e2e

      - name: Install E2E dependencies
        run: npm ci
        working-directory: e2e

      - name: Run Playwright tests
        run: npx playwright test
        working-directory: e2e
        env:
          FRONTEND_URL: http://localhost:3000
          API_URL: http://localhost:5001

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 7
